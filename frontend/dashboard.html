<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="loadDashboard()">
    <div class="container">
        <div class="topbar">
            <h2 id="welcomeText">Dashboard</h2>
            <button onclick="logoutUser()">Logout</button>
        </div>

        <div id="employeeSection" class="hidden">
            <h3>Employee Options</h3>
            <button onclick="window.location.href='apply-leave.html'">Apply Leave</button>
            <button onclick="window.location.href='my-leaves.html'">My Leaves</button>
        </div>

        <div id="managerSection" class="hidden">
            <h3>Manager Options</h3>
            <button onclick="window.location.href='all-leaves.html'">View All Leaves</button>
        </div>

        <div id="adminSection" class="hidden">
            <h3>Admin Options</h3>
            <button onclick="window.location.href='employees.html'">Manage Employees</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
